<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>اختبار تفاعلي</title>
<style>
body {
    font-family: Arial, sans-serif;
    background-color: #f4f4f4;
    text-align: center;
    padding: 20px;
}
.container {
    background-color: #fff;
    max-width: 700px;
    margin: auto;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 0 10px #ccc;
}
h2 { color: #333; }
button {
    padding: 10px 20px;
    margin: 10px;
    cursor: pointer;
    border-radius: 5px;
    border: none;
    background-color: #007bff;
    color: #fff;
    font-size: 16px;
}
button:hover { background-color: #0056b3; }
.option { display: block; margin: 10px 0; }
.explanation { margin-top: 15px; color: #555; }
.result { font-size: 20px; color: green; margin-top: 20px; }
.hidden { display: none; }
</style>
</head>
<body>
<div class="container">
    <h2>اختبار التخطيط الاستراتيجي</h2>
    <div id="quiz">
        <p id="question"></p>
        <div id="options"></div>
        <p class="explanation hidden" id="explanation"></p>
        <button id="nextBtn" class="hidden">التالي</button>
    </div>
    <div id="result" class="result hidden"></div>
</div>

<script>
// بنك الأسئلة
const questionBank = [
    {
        text:"بدأت مؤسسة حكومية إعداد خطتها الاستراتيجية دون الرجوع إلى الاستراتيجية الوطنية. ما المشكلة الأساسية؟",
        options:["غياب الترابط العمودي مع الاستراتيجية الوطنية","ضعف الموارد","زيادة عدد الموظفين","ضعف التدريب"],
        correct:0,
        explanation:"الخطط المؤسسية يجب أن تنطلق من الاستراتيجية الوطنية لضمان الاتساق بين مستويات التخطيط."
    },
    {
        text:"اعتمد فريق التخطيط على آراء شخصية بدلاً من بيانات وإحصاءات رسمية. ما الخلل؟",
        options:["غياب التخطيط المبني على الأدلة","ضعف المشاركة","ضعف الموارد","ضعف الابتكار"],
        correct:0,
        explanation:"التخطيط الاستراتيجي يجب أن يعتمد على بيانات موثوقة ومؤشرات أداء."
    },
    {
        text:"كتبت إدارة التخطيط الخطة الاستراتيجية دون إشراك الإدارات الأخرى. ماذا سيحدث غالباً؟",
        options:["ضعف التملك المؤسسي للخطة","زيادة الابتكار","زيادة الموارد","تحسن التنفيذ"],
        correct:0,
        explanation:"المشاركة تزيد الالتزام بتنفيذ الخطة."
    }
];

// متغيرات
let currentQuestion = 0;
let score = 0;

// دالة عرض السؤال
function showQuestion() {
    document.getElementById("explanation").classList.add("hidden");
    document.getElementById("nextBtn").classList.add("hidden");

    const q = questionBank[currentQuestion];
    document.getElementById("question").textContent = q.text;

    const optionsDiv = document.getElementById("options");
    optionsDiv.innerHTML = "";

    q.options.forEach((option, index) => {
        const btn = document.createElement("button");
        btn.textContent = option;
        btn.className = "option";
        btn.onclick = () => checkAnswer(index);
        optionsDiv.appendChild(btn);
    });
}

// دالة التحقق من الإجابة
function checkAnswer(selected) {
    const q = questionBank[currentQuestion];
    const explanationEl = document.getElementById("explanation");
    explanationEl.textContent = q.explanation;
    explanationEl.classList.remove("hidden");

    if(selected === q.correct) score++;

    // تعطيل كل الأزرار بعد الاختيار
    const buttons = document.querySelectorAll(".option");
    buttons.forEach(btn => btn.disabled = true);

    document.getElementById("nextBtn").classList.remove("hidden");
}

// الانتقال للسؤال التالي أو عرض النتيجة
document.getElementById("nextBtn").addEventListener("click", () => {
    currentQuestion++;
    if(currentQuestion < questionBank.length) {
        showQuestion();
    } else {
        showResult();
    }
});

function showResult() {
    document.getElementById("quiz").classList.add("hidden");
    const resultEl = document.getElementById("result");
    resultEl.textContent = `لقد أنهيت الاختبار! نتيجتك: ${score} / ${questionBank.length}`;
    resultEl.classList.remove("hidden");
}

// بدء الاختبار
showQuestion();
</script>
</body>
</html>
